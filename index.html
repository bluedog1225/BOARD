<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전략 장기 보드</title>
    <style>
        :root {
            --board-bg: #e3b06b; /* 장기판 특유의 나무 색상 */
            --line-color: #4a3219; /* 진한 나무색 선 */
            --cell-size: 70px;
        }

        body {
            background-color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            margin-top: 50px;
        }

        /* 장기판 본체 */
        .board-container {
            padding: 20px;
            background-color: var(--board-bg);
            border: 5px solid #8b5a2b;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 4px;
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: var(--cell-size) var(--cell-size);
            border-right: 1px solid var(--line-color);
            border-bottom: 1px solid var(--line-color);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: default;
            position: relative;
            transition: background 0.2s;
        }

        /* 편집 모드일 때 효과 */
        .editable .cell { cursor: pointer; }
        .editable .cell:hover { background-color: rgba(255, 255, 255, 0.2); }

        /* 장기판 특유의 X자 (궁) 표시 - 임의로 양 끝 중앙에 배치 */
        .cell.palace-center::before,
        .cell.palace-center::after {
            content: "";
            position: absolute;
            width: 141%; /* 대각선 길이 */
            height: 1px;
            background-color: var(--line-color);
            top: 50%;
            left: 50%;
            z-index: 0;
        }
        .cell.palace-center::before { transform: translate(-50%, -50%) rotate(45deg); }
        .cell.palace-center::after { transform: translate(-50%, -50%) rotate(-45deg); }

        .controls { margin-top: 30px; text-align: center; }
        .btn {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background: #8b5a2b;
            color: white;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px #5d3d1d;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px #5d3d1d; }
        .btn.active { background: #d35400; box-shadow: 0 4px #a04000; }
        
        .legend { margin-top: 15px; font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <h2>전략 배치도 (木)</h2>

    <div class="board-container">
        <div id="board" class="board"></div>
    </div>

    <div class="controls">
        <button id="editBtn" class="btn" onclick="toggleEdit()">편집 모드 시작</button>
        <div class="legend">
            <b>좌클릭:</b> 유닛 순환 | <b>우클릭:</b> 삭제 (나만 가능)
        </div>
    </div>

    <script>
        const board = document.getElementById('board');
        const editBtn = document.getElementById('editBtn');
        let isEditable = false;

        // 유닛 목록 (한자 느낌이나 장기말 느낌의 이모지)
        const units = ["楚", "漢", "兵", "卒", "車", "包", "馬"];

        for (let i = 0; i < 50; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            
            // 10x5에서 양쪽 중앙에 X자(궁) 표시 추가 (2,1 칸과 7,1 칸 근처)
            if (i === 11 || i === 18) {
                cell.classList.add('palace-center');
            }

            cell.addEventListener('click', () => {
                if (!isEditable) return;
                const currentIdx = units.indexOf(cell.innerText);
                const nextIdx = currentIdx + 1;
                cell.innerText = nextIdx >= units.length ? "" : units[nextIdx];
                cell.style.color = (cell.innerText === "楚" || cell.innerText === "卒") ? "#003399" : "#cc0000";
            });

            cell.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                if (isEditable) cell.innerText = "";
            });

            board.appendChild(cell);
        }

        function toggleEdit() {
            isEditable = !isEditable;
            board.classList.toggle('editable', isEditable);
            editBtn.innerText = isEditable ? "배치 완료 (저장)" : "편집 모드 시작";
            editBtn.classList.toggle('active', isEditable);
        }
    </script>
</body>
</html>
