<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수묵전략도 v3 (U자형)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        :root {
            --board-bg: #eacda3; 
            --line-color: rgba(42, 35, 28, 0.6);
            --cell-size: 100px; /* 정보를 위해 살짝 더 키웠습니다 */
            --ink-color: #1a1a1a;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #dcdcdc;
            font-family: 'Noto Serif KR', serif;
            margin: 0; padding: 20px 0;
            min-height: 100vh;
        }

        h1 { letter-spacing: 15px; font-weight: 400; margin-bottom: 20px; text-shadow: 0 0 10px rgba(255,255,255,0.1); }

        /* 한지 질감 및 두꺼운 프레임 */
        .board-container {
            padding: 20px;
            background-color: var(--board-bg);
            background-image: url('https://www.transparenttextures.com/patterns/papyrus-dark.png');
            border: 10px solid #5d4037;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            border-radius: 4px;
            position: relative;
        }

        /* U자형 배치 (Grid) */
        .board {
            display: grid;
            grid-template-columns: repeat(3, var(--cell-size));
            grid-template-rows: repeat(3, var(--cell-size));
            gap: 1px; /* 칸 사이 가는 선 */
            border: 1px solid var(--line-color);
        }

        /* 각 칸의 위치 정의 */
        .cell {
            border: 0.5px solid var(--line-color);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; padding: 5px; box-sizing: border-box;
            background: rgba(255,255,255,0.1); /* 미세한 칸 구분 */
        }

        /* 제공해주신 이미지에 맞춘 칸 배치 */
        .cell[data-pos="1"] { grid-column: 1; grid-row: 1; }
        .cell[data-pos="2"] { grid-column: 2; grid-row: 1; }
        .cell[data-pos="3"] { grid-column: 3; grid-row: 1; }
        .cell[data-pos="4"] { grid-column: 1; grid-row: 2; }
        .cell[data-pos="5"] { grid-column: 3; grid-row: 2; }
        .cell[data-pos="6"] { grid-column: 1; grid-row: 3; }
        .cell[data-pos="7"] { grid-column: 2; grid-row: 3; }
        .cell[data-pos="8"] { grid-column: 3; grid-row: 3; }

        /* 중앙 빈 공간 (제공 이미지의 사각형) */
        .center-space {
            grid-column: 2; grid-row: 2;
            border: 2px solid #5d4037;
            display: flex; align-items: center; justify-content: center;
            background: rgba(42, 35, 28, 0.1);
            color: #5d4037; font-size: 14px; font-weight: bold;
            text-align: center; font-style: italic;
        }

        /* 칸 내부 요소 스타일 (v2 동일) */
        .cell-name { font-size: 11px; color: #5d4037; font-weight: bold; margin-bottom: 2px; height: 14px; }
        .unit { font-size: 40px; filter: blur(0.4px); line-height: 1; }
        .unit-count { 
            position: absolute; bottom: 3px; right: 5px;
            font-size: 13px; color: white; font-weight: bold;
            background: rgba(42, 35, 28, 0.8); border-radius: 50%; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center; z-index: 3;
        }

        /* 편집 팔레트 모달 */
        #paletteModal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(245, 230, 210, 0.98);
            border: 3px solid #5d4037; padding: 25px;
            z-index: 200; box-shadow: 0 20px 80px rgba(0,0,0,0.7);
            border-radius: 10px; width: 280px; display: none;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 150; display: none;
        }

        .palette-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px dotted #ccc; }
        .palette-title { font-size: 14px; color: #5d4037; margin-bottom: 10px; font-weight: bold; }

        .icon-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .palette-item { cursor: pointer; text-align: center; font-size: 30px; padding: 5px; }
        .palette-item:hover { transform: scale(1.1); background: rgba(0,0,0,0.05); }

        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input[type="text"], input[type="number"] {
            border: 1px solid #8d6e63; background: #fff; padding: 8px; font-family: inherit; font-size: 14px;
        }

        .editable .cell { cursor: pointer; }
        .editable .cell:hover { background-color: rgba(0, 0, 0, 0.05); }

        .controls { margin-top: 40px; text-align: center; }
        .btn { padding: 12px 30px; cursor: pointer; border: 1px solid #8d6e63; background: transparent; color: #eacda3; margin: 5px; font-family: inherit; font-size: 16px; }
        .btn.active { background: #8d6e63; color: white; border-color: #8d6e63; }
    </style>
</head>
<body>

    <h1>戰術圖: 八方陣</h1>

    <div class="board-container">
        <div id="board" class="board">
            <div class="cell" data-pos="1"></div>
            <div class="cell" data-pos="2"></div>
            <div class="cell" data-pos="3"></div>
            <div class="cell" data-pos="4"></div>
            <div class="center-space">
                <span>전략 중앙<br>(戰術中央)</span>
            </div>
            <div class="cell" data-pos="5"></div>
            <div class="cell" data-pos="6"></div>
            <div class="cell" data-pos="7"></div>
            <div class="cell" data-pos="8"></div>
        </div>

        <div class="modal-overlay" id="modalOverlay"></div>
        <div id="paletteModal">
            <div class="palette-section">
                <div class="palette-title">말 선택</div>
                <div class="icon-grid" id="iconGrid"></div>
            </div>
            <div class="palette-section">
                <div class="input-group">
                    <div class="palette-title">칸 이름</div>
                    <input type="text" id="nameInput" placeholder="이름 입력...">
                    <div class="palette-title">병력 수</div>
                    <input type="number" id="countInput" value="1" min="1" max="99">
                </div>
            </div>
            <button class="btn" style="width:100%; color:#1a1a1a; border-color:#1a1a1a;" onclick="applyChanges()">적용</button>
        </div>
    </div>

    <div class="controls">
        <button id="editBtn" class="btn" onclick="toggleEdit()">붓 들기 (편집)</button>
        <button class="btn" onclick="copyShareLink()">링크 복사</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const modal = document.getElementById('paletteModal');
        const overlay = document.getElementById('modalOverlay');
        const editBtn = document.getElementById('editBtn');
        let isEditable = false;
        let selectedCell = null;

        const units = ["🛡️", "⚔️", "🍑"]; 

        function init() {
            // 보드의 칸 초기화 및 이벤트 연결
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                cell.innerHTML = `<div class="cell-name"></div><div class="unit"></div><div class="unit-count" style="display:none"></div>`;
                cell.onclick = (e) => openPalette(cell);
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (isEditable) { cell.querySelector('.cell-name').innerText = ""; cell.querySelector('.unit').innerText = ""; cell.querySelector('.unit-count').style.display="none"; updateURL(); }
                });
            });

            // 팔레트 아이콘 목록 생성 (모달 전용)
            const iconGrid = document.getElementById('iconGrid');
            units.forEach(u => {
                const div = document.createElement('div');
                div.className = 'palette-item';
                div.innerText = u;
                div.onclick = () => {
                    selectedCell.querySelector('.unit').innerText = u;
                };
                iconGrid.appendChild(div);
            });
            // 지우기 아이콘
            const eraser = document.createElement('div');
            eraser.className = 'palette-item';
            eraser.innerText = "✖️";
            eraser.onclick = () => { selectedCell.querySelector('.unit').innerText = ""; };
            iconGrid.appendChild(eraser);

            // 오버레이 클릭 시 모달 닫기
            overlay.onclick = closePalette;
        }

        function openPalette(cell) {
            if (!isEditable) return;
            selectedCell = cell;
            
            // 기존 값 불러오기
            document.getElementById('nameInput').value = cell.querySelector('.cell-name').innerText;
            const count = cell.querySelector('.unit-count').innerText;
            document.getElementById('countInput').value = count || 1;

            modal.style.display = 'block';
            overlay.style.display = 'block';
        }

        function closePalette() {
            modal.style.display = 'none';
            overlay.style.display = 'none';
            selectedCell = null;
        }

        function applyChanges() {
            if (!selectedCell) return;
            const name = document.getElementById('nameInput').value;
            const count = document.getElementById('countInput').value;
            const unit = selectedCell.querySelector('.unit').innerText;

            selectedCell.querySelector('.cell-name').innerText = name;
            const countDiv = selectedCell.querySelector('.unit-count');
            
            if (unit && count > 1) {
                countDiv.innerText = count;
                countDiv.style.display = 'flex';
            } else {
                countDiv.style.display = 'none';
            }

            closePalette();
            updateURL();
        }

        function toggleEdit() {
            isEditable = !isEditable;
            board.classList.toggle('editable', isEditable);
            editBtn.innerText = isEditable ? "낙관 찍기 (완료)" : "붓 들기 (편집)";
            editBtn.classList.toggle('active', isEditable);
            if (!isEditable) closePalette();
        }

        // 데이터 저장 (Base64 인코딩)
        function updateURL() {
            const cells = document.querySelectorAll('.cell');
            const mapData = Array.from(cells).map(cell => {
                return {
                    pos: cell.dataset.pos, // 위치 정보 추가
                    n: cell.querySelector('.cell-name').innerText,
                    u: units.indexOf(cell.querySelector('.unit').innerText),
                    c: cell.querySelector('.unit-count').innerText
                };
            });
            const encoded = btoa(encodeURIComponent(JSON.stringify(mapData)));
            const newUrl = window.location.origin + window.location.pathname + '?data=' + encoded;
            window.history.replaceState({}, '', newUrl);
        }

        function loadBoardFromURL() {
            const params = new URLSearchParams(window.location.search);
            const encoded = params.get('data');
            if (encoded) {
                try {
                    const mapData = JSON.parse(decodeURIComponent(atob(encoded)));
                    mapData.forEach(data => {
                        const cell = board.querySelector(`.cell[data-pos="${data.pos}"]`);
                        if (cell) {
                            cell.querySelector('.cell-name').innerText = data.n || "";
                            if (data.u !== -1) {
                                cell.querySelector('.unit').innerText = units[data.u];
                                if (data.c && cells[i]) {
                                    cell.querySelector('.unit-count').innerText = data.c;
                                    cell.querySelector('.unit-count').style.display = 'flex';
                                }
                            }
                        }
                    });
                } catch(e) { console.error("데이터 로드 실패"); }
            }
        }

        function copyShareLink() {
            updateURL();
            navigator.clipboard.writeText(window.location.href);
            alert("공유 링크가 복사되었습니다!");
        }

        init();
        loadBoardFromURL();
    </script>
</body>
</html>
