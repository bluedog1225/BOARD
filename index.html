<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수묵전략도 (三才)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        :root {
            --board-bg: #eacda3; 
            --line-color: rgba(42, 35, 28, 0.6);
            --cell-size: 65px;
            --ink-color: #1a1a1a;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #dcdcdc;
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            padding: 40px 0;
            min-height: 100vh;
        }

        h1 { letter-spacing: 15px; font-weight: 400; margin-bottom: 30px; }

        .board-container {
            padding: 30px;
            background-color: var(--board-bg);
            background-image: url('https://www.transparenttextures.com/patterns/papyrus-dark.png');
            border: 10px solid #5d4037;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            position: relative;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            border: 1px solid var(--line-color);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 0.5px solid var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .unit {
            font-size: 35px;
            color: var(--ink-color);
            filter: blur(0.4px) contrast(1.2);
            user-select: none;
            z-index: 2;
        }

        /* 아이콘 선택 팔레트 (3개 전용) */
        #palette {
            position: absolute;
            display: none;
            background: rgba(234, 205, 163, 0.98);
            border: 2px solid #5d4037;
            padding: 15px;
            grid-template-columns: repeat(4, 1fr); /* 3개 + 지우개 */
            gap: 15px;
            z-index: 100;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border-radius: 8px;
        }

        .palette-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s;
        }
        
        .palette-item span { font-size: 32px; }
        .palette-item label { font-size: 10px; color: #5d4037; margin-top: 5px; cursor: pointer; }

        .palette-item:hover { transform: scale(1.1); background: rgba(0,0,0,0.05); }

        .editable .cell { cursor: pointer; }
        .editable .cell:hover { background-color: rgba(0, 0, 0, 0.05); }

        .controls { margin-top: 40px; text-align: center; }
        .btn {
            padding: 12px 35px;
            cursor: pointer;
            border: 1px solid #8d6e63;
            background: transparent;
            color: #eacda3;
            font-family: 'Noto Serif KR', serif;
            margin: 5px;
        }
        .btn.active { background: #8d6e63; color: white; }
    </style>
</head>
<body>

    <h1>三才圖 (삼재도)</h1>

    <div class="board-container">
        <div id="board" class="board"></div>
        <div id="palette"></div>
    </div>

    <div class="controls">
        <button id="editBtn" class="btn" onclick="toggleEdit()">붓 들기 (편집)</button>
        <button class="btn" onclick="copyShareLink()">링크 복사</button>
    </div>

    <script>
        const board = document.getElementById('board');
        const palette = document.getElementById('palette');
        const editBtn = document.getElementById('editBtn');
        let isEditable = false;
        let selectedCell = null;

        // 아이콘 종류를 3개로 압축
        const units = [
            { icon: "🛡️", label: "방패" },
            { icon: "⚔️", label: "검" },
            { icon: "🍑", label: "복숭아" }
        ]; 

        function init() {
            for (let i = 0; i < 50; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                cell.addEventListener('click', (e) => openPalette(e, cell));
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (isEditable) { cell.innerHTML = ""; updateURL(); }
                });
                board.appendChild(cell);
            }

            // 팔레트 아이콘 구성
            units.forEach((u, index) => {
                const item = document.createElement('div');
                item.className = 'palette-item';
                item.innerHTML = `<span>${u.icon}</span><label>${u.label}</label>`;
                item.onclick = () => selectUnit(u.icon);
                palette.appendChild(item);
            });
            
            // 지우개
            const eraser = document.createElement('div');
            eraser.className = 'palette-item';
            eraser.innerHTML = `<span>✖️</span><label>지우기</label>`;
            eraser.onclick = () => selectUnit("");
            palette.appendChild(eraser);
        }

        function openPalette(e, cell) {
            if (!isEditable) return;
            selectedCell = cell;
            palette.style.display = 'grid';
            
            // 클릭 위치 근처에 팔레트 배치
            const rect = board.getBoundingClientRect();
            palette.style.left = (e.pageX - window.pageXOffset - rect.left) + 'px';
            palette.style.top = (e.pageY - window.pageYOffset - rect.top) + 'px';
        }

        function selectUnit(u) {
            if (selectedCell) {
                selectedCell.innerHTML = u ? `<span class="unit">${u}</span>` : "";
                palette.style.display = 'none';
                updateURL();
            }
        }

        window.addEventListener('click', (e) => {
            if (!e.target.closest('.cell') && !e.target.closest('#palette')) {
                palette.style.display = 'none';
            }
        });

        function toggleEdit() {
            isEditable = !isEditable;
            board.classList.toggle('editable', isEditable);
            editBtn.innerText = isEditable ? "낙관 찍기 (완료)" : "붓 들기 (편집)";
            editBtn.classList.toggle('active', isEditable);
            if (!isEditable) palette.style.display = 'none';
        }

        function updateURL() {
            const cells = document.querySelectorAll('.cell');
            const iconsOnly = units.map(u => u.icon);
            const data = Array.from(cells).map(cell => {
                const unit = cell.querySelector('.unit');
                return unit ? iconsOnly.indexOf(unit.innerText) : '.';
            }).join('');
            const newUrl = window.location.origin + window.location.pathname + '?map=' + data;
            window.history.replaceState({}, '', newUrl);
        }

        function loadBoardFromURL() {
            const params = new URLSearchParams(window.location.search);
            const mapData = params.get('map');
            const iconsOnly = units.map(u => u.icon);
            if (mapData) {
                const cells = document.querySelectorAll('.cell');
                mapData.split('').forEach((char, i) => {
                    if (char !== '.' && iconsOnly[char]) {
                        cells[i].innerHTML = `<span class="unit">${iconsOnly[char]}</span>`;
                    }
                });
            }
        }

        function copyShareLink() {
            updateURL();
            navigator.clipboard.writeText(window.location.href);
            alert("공유 링크가 클립보드에 복사되었습니다!");
        }

        init();
        loadBoardFromURL();
    </script>
</body>
</html>
