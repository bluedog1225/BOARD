<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수묵전략도 (水墨戰略圖)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        :root {
            --board-bg: #eacda3; 
            --line-color: rgba(42, 35, 28, 0.6);
            --cell-size: 65px;
            --ink-color: #1a1a1a;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #dcdcdc;
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            padding: 40px 0;
            min-height: 100vh;
        }

        h1 {
            letter-spacing: 15px;
            font-weight: 400;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
        }

        /* 한지 느낌의 보드 컨테이너 */
        .board-container {
            padding: 30px;
            background-color: var(--board-bg);
            background-image: url('https://www.transparenttextures.com/patterns/papyrus-dark.png');
            border: 10px solid #5d4037;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
            position: relative;
            border-radius: 2px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            border: 1px solid var(--line-color);
            position: relative;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 0.5px solid var(--line-color);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
        }

        /* 수묵화 유닛 스타일 */
        .unit {
            font-size: 40px;
            color: var(--ink-color);
            filter: blur(0.4px) contrast(1.2);
            user-select: none;
            cursor: default;
            z-index: 2;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 편집 모드 스타일 */
        .editable .cell { cursor: pointer; }
        .editable .cell:hover { background-color: rgba(0, 0, 0, 0.05); }

        /* 하단 컨트롤 */
        .controls {
            margin-top: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-group { display: flex; gap: 10px; justify-content: center; }

        .btn {
            padding: 12px 35px;
            cursor: pointer;
            border: 1px solid #8d6e63;
            background: transparent;
            color: #eacda3;
            font-family: 'Noto Serif KR', serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover { background: #eacda3; color: #1a1a1a; }
        .btn.active { background: #8d6e63; color: white; }

        .info-text {
            font-size: 14px;
            color: #888;
            line-height: 1.6;
        }

        /* 공유 팝업 느낌 알림 */
        #toast {
            position: fixed;
            bottom: 20px;
            background: rgba(141, 110, 99, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>戰略圖 (전략도)</h1>

    <div class="board-container">
        <div id="board" class="board"></div>
    </div>

    <div class="controls">
        <div class="btn-group">
            <button id="editBtn" class="btn" onclick="toggleEdit()">붓 들기 (편집)</button>
            <button id="shareBtn" class="btn" onclick="copyShareLink()">링크 복사</button>
        </div>
        <div class="info-text">
            <b>편집 모드:</b> 좌클릭으로 유닛 순환, 우클릭으로 삭제<br>
            링크를 복사해 다른 사람에게 현재 배치를 공유하세요.
        </div>
    </div>

    <div id="toast">링크가 클립보드에 복사되었습니다!</div>

    <script>
        const board = document.getElementById('board');
        const editBtn = document.getElementById('editBtn');
        const toast = document.getElementById('toast');
        let isEditable = false;

        // 수묵화 테마 유닛 (인덱스 0~6)
        const units = ["🐉", "🐅", "🦅", "🐎", "🎋", "⛰️", "🌙"]; 

        // 1. 보드 생성
        function createBoard() {
            for (let i = 0; i < 50; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.index = i;
                
                // 좌클릭: 유닛 배치/순환
                cell.addEventListener('click', () => {
                    if (!isEditable) return;
                    cycleUnit(cell);
                    updateURL(); // 실시간 주소 업데이트
                });

                // 우클릭: 유닛 삭제
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (!isEditable) return;
                    cell.innerHTML = "";
                    updateURL();
                });

                board.appendChild(cell);
            }
        }

        function cycleUnit(cell) {
            const currentUnit = cell.querySelector('.unit');
            let nextIdx = 0;

            if (currentUnit) {
                const currentIdx = units.indexOf(currentUnit.innerText);
                nextIdx = currentIdx + 1;
                cell.innerHTML = "";
            }

            if (nextIdx < units.length) {
                const span = document.createElement('span');
                span.className = 'unit';
                span.innerText = units[nextIdx];
                cell.appendChild(span);
            }
        }

        // 2. 편집 모드 토글
        function toggleEdit() {
            isEditable = !isEditable;
            board.classList.toggle('editable', isEditable);
            editBtn.innerText = isEditable ? "낙관 찍기 (완료)" : "붓 들기 (편집)";
            editBtn.classList.toggle('active', isEditable);
            
            if (!isEditable) {
                showToast("배치가 저장되었습니다.");
                updateURL();
            }
        }

        // 3. URL 파라미터로 상태 저장
        function updateURL() {
            const cells = document.querySelectorAll('.cell');
            const data = Array.from(cells).map(cell => {
                const unit = cell.querySelector('.unit');
                return unit ? units.indexOf(unit.innerText) : '.';
            }).join('');
            
            const newUrl = window.location.origin + window.location.pathname + '?map=' + data;
            window.history.replaceState({}, '', newUrl);
        }

        // 4. URL에서 데이터 불러오기
        function loadBoardFromURL() {
            const params = new URLSearchParams(window.location.search);
            const mapData = params.get('map');
            
            if (mapData) {
                const cells = document.querySelectorAll('.cell');
                const dataArray = mapData.split('');
                
                dataArray.forEach((char, i) => {
                    if (char !== '.' && units[char] && cells[i]) {
                        const span = document.createElement('span');
                        span.className = 'unit';
                        span.innerText = units[char];
                        cells[i].appendChild(span);
                    }
                });
            }
        }

        function copyShareLink() {
            updateURL();
            navigator.clipboard.writeText(window.location.href);
            showToast("공유 링크가 복사되었습니다!");
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        // 초기화 실행
        createBoard();
        loadBoardFromURL();
    </script>
</body>
</html>
